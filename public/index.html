<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Store</title>

    <link rel="stylesheet" href="style.css">
</head>
<script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
<body>

    <nav>

    <h1>Tech Store</h1>

    <div class="nav-buttons">

        <a href="login.html">
            <button id="login-btn">
                Login
            </button>
        </a>

        <a href="register.html">
            <button id="register-btn">
                Register
            </button>
        </a>

        <button id="logout-btn" onclick="logoutUser()">
            Logout
        </button>

        <span id="user-info"></span>

        <a href="cart.html">
            <button id="cart-btn">
                Cart 🛒 (<span id="cart-count">0</span>)
            </button>
        </a>

        <button id="theme-btn" onclick="toggleTheme()">
          🌙
         </button>


        <button id="orders-btn" onclick="window.location.href='orders.html'">
             Orders 📦
         </button>

    </div>
    </nav>

    <div class="search-box">

    <input
        type="text"
        id="search-input"
        placeholder="Search products..."
    >

    <select id="category-filter">

        <option value="All">
            All Categories
        </option>

        <option value="Accessories">
            Accessories
        </option>

        <option value="Audio">
            Audio
        </option>

        <option value="Computing">
            Computing
        </option>

        <option value="Wearables">
            Wearables
        </option>

        <option value="Furniture">
            Furniture
        </option>

    </select>

    </div>
     
    <h2 id="loading">Loading Products...</h2>

    <div id="products-container"></div>

    <script src="script.js"></script>

</body>
</html>
